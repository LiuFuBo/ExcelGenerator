name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install PySide6 openpyxl pypinyin pyinstaller

      - name: Build EXE
        shell: cmd
        run: pyinstaller --onefile --windowed --name "ExcelGenerator" --icon=header.ico --hidden-import=pypinyin --hidden-import=openpyxl --hidden-import=openpyxl.cell._writer --add-data="jj_header_rounded.png;." --add-data="city_address.json;." --add-data="icon_map.png;." --collect-data=pypinyin --noconfirm app.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4.6.0
        with:
          name: ExcelGenerator-Windows
          path: dist\ExcelGenerator.exe