name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install PySide6 openpyxl pypinyin Pillow pyinstaller

      - name: Build EXE
        shell: cmd
        run: pyinstaller --onefile --windowed --name "ExcelGenerator" --icon=header.ico --hidden-import=pypinyin --hidden-import=openpyxl --hidden-import=openpyxl.cell._writer --hidden-import=PIL --hidden-import=PIL.Image --hidden-import=PIL.ImageOps --hidden-import=PIL.ImageDraw --hidden-import=PIL.ImageFont --hidden-import=PIL.ImageFilter --add-data="jj_header_rounded.png;." --add-data="city_address.json;." --add-data="icon_map.png;." --collect-data=pypinyin --noconfirm app.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v7
        with:
          name: ExcelGenerator-Windows
          path: dist\ExcelGenerator.exe